<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RACC 芒聙聯 Estalvi Energ脙篓tic</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
:root{
  --brand:#7B2FBE;--brand-dark:#5a1e8e;--brand-light:#f3eaff;
  --accent:#F59E0B;--green:#10B981;--red:#EF4444;--blue:#3B82F6;
  --gray:#6B7280;--border:#E5E7EB;--bg:#F9FAFB;--card:#ffffff;
  --text:#111827;--subtext:#6B7280;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ---- LOGIN ---- */
#login-overlay{position:fixed;inset:0;background:linear-gradient(135deg,var(--brand) 0%,var(--brand-dark) 100%);display:flex;align-items:center;justify-content:center;z-index:1000}
.login-box{background:var(--card);border-radius:16px;padding:48px 40px;width:340px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.login-box .logo{font-size:28px;font-weight:800;color:var(--brand);letter-spacing:2px;margin-bottom:8px}
.login-box p{color:var(--subtext);font-size:14px;margin-bottom:32px}
.login-box input{width:100%;border:2px solid var(--border);border-radius:8px;padding:12px 16px;font-size:16px;outline:none;transition:border-color .2s;margin-bottom:16px}
.login-box input:focus{border-color:var(--brand)}
.login-box button{width:100%;background:var(--brand);color:#fff;border:none;border-radius:8px;padding:12px;font-size:16px;font-weight:600;cursor:pointer;transition:background .2s}
.login-box button:hover{background:var(--brand-dark)}
.login-box .err{color:var(--red);font-size:13px;margin-top:8px;min-height:20px}

/* ---- MAIN LAYOUT ---- */
#app{display:none}
header{background:var(--brand);color:#fff;padding:16px 32px;display:flex;align-items:center;gap:16px}
header .logo{font-size:22px;font-weight:800;letter-spacing:1px}
header .subtitle{font-size:14px;opacity:.85}
header .meta{margin-left:auto;font-size:12px;opacity:.75;text-align:right}

/* ---- NAV TABS (dashboard selector) ---- */
.nav-tabs{background:var(--card);border-bottom:2px solid var(--border);display:flex;gap:0;padding:0 32px}
.nav-tab{padding:14px 24px;font-size:15px;font-weight:600;color:var(--subtext);cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s}
.nav-tab:hover{color:var(--brand)}
.nav-tab.active{color:var(--brand);border-bottom-color:var(--brand)}

/* ---- PERIOD BUTTONS ---- */
.period-bar{background:var(--card);padding:16px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn-periodo{padding:8px 18px;border-radius:20px;border:2px solid var(--border);background:var(--card);color:var(--subtext);font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-periodo:hover{border-color:var(--brand);color:var(--brand)}
.btn-periodo.active{background:var(--brand);border-color:var(--brand);color:#fff}
.date-range-bar{display:none;align-items:center;gap:8px;margin-left:8px;flex-wrap:wrap}
.date-range-bar.visible{display:flex}
.date-range-bar label{font-size:13px;color:var(--subtext);font-weight:500}
.date-range-bar input[type=date]{padding:6px 10px;border:2px solid var(--border);border-radius:8px;font-size:13px;outline:none}
.date-range-bar input[type=date]:focus{border-color:var(--brand)}
.btn-apply{padding:7px 16px;background:var(--brand);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn-apply:hover{background:var(--brand-dark)}

/* ---- DASHBOARD CONTENT ---- */
#dashboard-view{padding:28px 32px;max-width:1400px;margin:0 auto}
#rawdata-view{display:none;padding:28px 32px;max-width:1400px;margin:0 auto}

/* ---- KPI CARDS ---- */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.kpi-card{background:var(--card);border-radius:12px;padding:20px 20px 16px;box-shadow:0 1px 4px rgba(0,0,0,.08);transition:transform .15s}
.kpi-card:hover{transform:translateY(-2px)}
.kpi-card .kpi-label{font-size:12px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi-card .kpi-value{font-size:32px;font-weight:800;color:var(--text)}
.kpi-card .kpi-sub{font-size:12px;color:var(--gray);margin-top:4px}
.kpi-card.highlight .kpi-value{color:var(--brand)}

/* ---- SECTION HEADERS ---- */
.section-title{font-size:16px;font-weight:700;color:var(--text);margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--bg)}

/* ---- TWO-COL GRID ---- */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
.card{background:var(--card);border-radius:12px;padding:22px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}
.full-col{margin-bottom:24px}

/* ---- TABLES ---- */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg);color:var(--gray);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:10px 12px;text-align:left;border-bottom:2px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
th:hover{color:var(--brand)}
th.sorted-asc::after{content:' 芒聳虏'}
th.sorted-desc::after{content:' 芒聳录'}
td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--subtext)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--brand-light)}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600}
.badge-yes{background:#d1fae5;color:#065f46}
.badge-no{background:#fee2e2;color:#991b1b}
.funnel-bar-wrap{background:var(--border);border-radius:4px;height:8px;min-width:60px}
.funnel-bar{background:var(--brand);border-radius:4px;height:8px;transition:width .4s}
.pct-label{font-size:11px;color:var(--gray);margin-left:6px}

/* ---- PERIOD DATE DISPLAY ---- */
.period-info{font-size:12px;color:var(--gray);margin-bottom:20px;font-style:italic}

/* ---- FUNNEL STEPS ---- */
.funnel-steps{display:flex;gap:8px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px}
.funnel-step{flex:1;min-width:130px;background:var(--card);border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);text-align:center;position:relative}
.funnel-step .step-label{font-size:11px;font-weight:600;color:var(--gray);text-transform:uppercase;letter-spacing:.3px;margin-bottom:8px}
.funnel-step .step-value{font-size:26px;font-weight:800;color:var(--text)}
.funnel-step .step-pct{font-size:12px;color:var(--brand);font-weight:600;margin-top:4px}
.funnel-arrow{display:flex;align-items:center;color:var(--border);font-size:18px;margin-top:20px}

/* ---- CHART ---- */
.chart-wrap{position:relative;height:260px}

/* ---- RAW DATA TOOLS ---- */
.raw-tools{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.raw-tools input[type=text]{flex:1;min-width:200px;padding:8px 14px;border:2px solid var(--border);border-radius:8px;font-size:13px;outline:none}
.raw-tools input[type=text]:focus{border-color:var(--brand)}
.btn-csv{padding:8px 16px;background:var(--green);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.btn-csv:hover{background:#059669}
.raw-count{font-size:13px;color:var(--gray)}
#raw-table-wrap table{font-size:12px}
#raw-table-wrap td{white-space:nowrap}

/* ---- EMPTY STATE ---- */
.empty{color:var(--gray);text-align:center;padding:32px;font-size:14px}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-overlay">
  <div class="login-box">
    <div class="logo">RACC</div>
    <p>Estalvi Energ脙篓tic 脗路 Dashboard</p>
    <input type="password" id="pw-input" placeholder="Contrase脙卤a" autofocus>
    <button onclick="doLogin()">Entrar</button>
    <div class="err" id="pw-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div>
      <div class="logo">RACC</div>
      <div class="subtitle">Estalvi Energ脙篓tic 脗路 Dashboard</div>
    </div>
    <div class="meta">
      Actualizado: <span id="gen-at">芒聙聯</span>
    </div>
  </header>

  <!-- MAIN NAV TABS -->
  <div class="nav-tabs">
    <div class="nav-tab active" id="tab-dashboard" onclick="switchView('dashboard')">冒聼聯聤 Dashboard</div>
    <div class="nav-tab" id="tab-rawdata" onclick="switchView('rawdata')">冒聼聯聥 Datos brutos</div>
  </div>

  <!-- PERIOD BAR -->
  <div class="period-bar">
    <button class="btn-periodo active" id="btn-all"   onclick="setPeriod('all',   this)">Total</button>
    <button class="btn-periodo"        id="btn-month" onclick="setPeriod('month', this)">Este mes</button>
    <button class="btn-periodo"        id="btn-week"  onclick="setPeriod('week',  this)">脙職ltima semana</button>
    <button class="btn-periodo"        id="btn-custom" onclick="setPeriod('custom', this)">Periodo personalizado</button>
    <div class="date-range-bar" id="date-range-bar">
      <label>Desde</label>
      <input type="date" id="dt-from">
      <label>Hasta</label>
      <input type="date" id="dt-to">
      <button class="btn-apply" onclick="applyCustomPeriod()">Aplicar</button>
    </div>
  </div>

  <!-- DASHBOARD VIEW -->
  <div id="dashboard-view">
    <div class="period-info" id="period-info"></div>

    <!-- KPIs -->
    <div class="kpi-grid" id="kpi-grid"></div>

    <!-- FUNNEL STEPS -->
    <div class="card full-col" style="margin-bottom:24px">
      <div class="section-title">Embudo de conversi脙鲁n</div>
      <div class="funnel-steps" id="funnel-steps"></div>
    </div>

    <!-- TWO COL: origin table + closure -->
    <div class="two-col">
      <div class="card">
        <div class="section-title">Resultados por origen</div>
        <div class="tbl-wrap" id="funnel-table"></div>
      </div>
      <div class="card">
        <div class="section-title">Motivos de cierre (handoff)</div>
        <div class="tbl-wrap" id="closure-table"></div>
      </div>
    </div>

    <!-- CHART -->
    <div class="card full-col" style="margin-bottom:24px" id="chart-card">
      <div class="section-title">Evoluci脙鲁n semanal</div>
      <div class="chart-wrap"><canvas id="weekly-chart"></canvas></div>
    </div>

    <!-- INCORRECT -->
    <div class="card full-col">
      <div class="section-title">Confirmaci脙鲁n datos factura</div>
      <div id="incorrect-section"></div>
    </div>
  </div>

  <!-- RAW DATA VIEW -->
  <div id="rawdata-view">
    <div class="card full-col">
      <div class="section-title" style="margin-bottom:16px">Conversaciones 脗路 Datos brutos</div>
      <div class="raw-tools">
        <input type="text" id="raw-search" placeholder="Buscar por ID, origen, tipolog脙颅a芒聙娄" oninput="filterRaw()">
        <span class="raw-count" id="raw-count"></span>
        <button class="btn-csv" onclick="exportCSV()">芒卢聡 Exportar CSV</button>
      </div>
      <div class="tbl-wrap" id="raw-table-wrap">
        <div class="empty">Cargando datos芒聙娄</div>
      </div>
    </div>
  </div>
</div>

<script>
// ---- AUTH ----
const PW = 'racc2026';
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key==='Enter') doLogin(); });
function doLogin() {
  if (document.getElementById('pw-input').value === PW) {
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadDashboard();
  } else {
    document.getElementById('pw-err').textContent = 'Contrase脙卤a incorrecta';
  }
}

// ---- STATE ----
let _data      = null;
let _period    = 'all';
let _chart     = null;
let _rawRows   = [];          // full raw array
let _rawFiltered = [];        // after search filter
let _rawSort   = {col: 'fecha', dir: 'desc'};
let _currentView = 'dashboard';

// ---- VIEW SWITCHING ----
function switchView(v) {
  _currentView = v;
  document.getElementById('dashboard-view').style.display = v==='dashboard' ? 'block' : 'none';
  document.getElementById('rawdata-view').style.display   = v==='rawdata'   ? 'block' : 'none';
  document.getElementById('tab-dashboard').classList.toggle('active', v==='dashboard');
  document.getElementById('tab-rawdata').classList.toggle('active', v==='rawdata');
  if (v==='rawdata' && _data) renderRawTable(_rawRows);
}

// ---- PERIOD ----
function setPeriod(p, btn) {
  document.querySelectorAll('.btn-periodo').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  _period = p;
  const bar = document.getElementById('date-range-bar');
  if (p === 'custom') {
    bar.classList.add('visible');
  } else {
    bar.classList.remove('visible');
    if (_data) renderAll();
  }
}

function applyCustomPeriod() {
  const from = document.getElementById('dt-from').value;
  const to   = document.getElementById('dt-to').value;
  if (!from || !to) { alert('Selecciona las dos fechas'); return; }
  if (from > to)    { alert('La fecha de inicio debe ser anterior al fin'); return; }
  if (_data) renderAllCustom(from, to);
}

// ---- RENDER ALL ----
function renderAll() {
  if (!_data) return;
  const d = (_period==='custom') ? null : (_data[_period] || _data.all);
  if (!d) return;
  renderKPIs(d);
  renderFunnelSteps(d);
  renderFunnelTable(d);
  renderClosure(d);
  renderIncorrect(d);
  renderPeriodDate(d);
}

function renderAllCustom(from, to) {
  const rows = (_data.raw || []).filter(r => r.fecha >= from && r.fecha <= to);
  const d    = computeFromRaw(rows, from, to);
  renderKPIs(d);
  renderFunnelSteps(d);
  renderFunnelTable(d);
  renderClosure(d);
  renderIncorrect(d);
  document.getElementById('period-info').textContent = `Per脙颅odo: ${from} 芒聠聮 ${to} (${rows.length} conversaciones)`;
  // Update weekly chart to show weeks in range
  const weekly = computeWeeklyFromRaw(rows);
  renderChart(weekly);
}

// ---- COMPUTE FROM RAW ----
function computeFromRaw(rows, from, to) {
  const byOrigen = {};
  for (const r of rows) {
    const o = r.origen || 'WA';
    if (!byOrigen[o]) byOrigen[o] = {origen:o, conversaciones:0, factura_total:0, factura_chat:0, factura_dades:0, cotitzacions:0, contractes:0, contractes_llum:0, contractes_gas:0};
    const g = byOrigen[o];
    g.conversaciones++;
    if (Number(r.factura))       g.factura_total++;
    if (Number(r.factura_chat))  g.factura_chat++;
    if (Number(r.factura_dades)) g.factura_dades++;
    if (Number(r.cotizacion))    g.cotitzacions++;
    if (Number(r.contrato))      g.contractes++;
    if (Number(r.contrato_luz))  g.contractes_llum++;
    if (Number(r.contrato_gas))  g.contractes_gas++;
  }
  const funnel = Object.values(byOrigen).sort((a,b)=>b.conversaciones-a.conversaciones);

  // closure counts
  const closureMap = {};
  for (const r of rows) {
    const t = r.tipologia || 'Sin datos';
    closureMap[t] = (closureMap[t]||0) + 1;
  }
  const closure = Object.entries(closureMap).map(([tipologia,total])=>({tipologia,total})).sort((a,b)=>b.total-a.total);

  // incorrect: we can't compute ko_llum/ko_gas from raw (no individual answers), show N/A
  const incorrect = {total_cot: funnel.reduce((s,r)=>s+Number(r.cotitzacions),0), cot_ko:null, ko_llum:null, ko_gas:null};

  return {date_from:from, date_to:to, funnel, closure, incorrect};
}

function computeWeeklyFromRaw(rows) {
  const wk = {};
  for (const r of rows) {
    if (!r.fecha) continue;
    const d   = new Date(r.fecha);
    const day = d.getDay(); // 0=sun
    const diff = (day === 0) ? 0 : (day === 1 ? 0 : -(day-1));  // Monday start
    const mon = new Date(d);
    mon.setDate(d.getDate() - (day===0?6:day-1));
    const key = mon.toISOString().substring(0,10);
    if (!wk[key]) wk[key] = {semana:key, conversaciones:0, cotitzacions:0, contractes:0};
    wk[key].conversaciones++;
    if (Number(r.cotizacion)) wk[key].cotitzacions++;
    if (Number(r.contrato))   wk[key].contractes++;
  }
  return Object.values(wk).sort((a,b)=>a.semana.localeCompare(b.semana));
}

// ---- KPIs ----
function renderKPIs(d) {
  const funnel = d.funnel || [];
  const tot   = funnel.reduce((s,r)=>s+Number(r.conversaciones),0);
  const fac   = funnel.reduce((s,r)=>s+Number(r.factura_total||0),0);
  const cot   = funnel.reduce((s,r)=>s+Number(r.cotitzacions||0),0);
  const con   = funnel.reduce((s,r)=>s+Number(r.contractes||0),0);
  const luz   = funnel.reduce((s,r)=>s+Number(r.contractes_llum||0),0);
  const gas   = funnel.reduce((s,r)=>s+Number(r.contractes_gas||0),0);

  const kpis = [
    {label:'Conversaciones', value:tot,  sub:'total iniciadas'},
    {label:'Facturas',       value:fac,  sub:`${tot?Math.round(fac/tot*100):0}% de conversaciones`},
    {label:'Cotizaciones',   value:cot,  sub:`${tot?Math.round(cot/tot*100):0}% de conversaciones`},
    {label:'Contratos',      value:con,  sub:`${tot?Math.round(con/tot*100):0}% de conversaciones`, highlight:true},
    {label:'Contratos Luz',  value:luz,  sub:`${tot?Math.round(luz/tot*100):0}% de conversaciones`},
    {label:'Contratos Gas',  value:gas,  sub:`${tot?Math.round(gas/tot*100):0}% de conversaciones`},
  ];
  document.getElementById('kpi-grid').innerHTML = kpis.map(k=>`
    <div class="kpi-card${k.highlight?' highlight':''}">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value.toLocaleString('es-ES')}</div>
      <div class="kpi-sub">${k.sub}</div>
    </div>`).join('');
}

// ---- FUNNEL STEPS ----
function renderFunnelSteps(d) {
  const funnel = d.funnel || [];
  const tot = funnel.reduce((s,r)=>s+Number(r.conversaciones),0);
  const fac = funnel.reduce((s,r)=>s+Number(r.factura_total||0),0);
  const cot = funnel.reduce((s,r)=>s+Number(r.cotitzacions||0),0);
  const con = funnel.reduce((s,r)=>s+Number(r.contractes||0),0);

  const steps = [
    {label:'Conversaciones', value:tot,  base:tot},
    {label:'Facturas',       value:fac,  base:tot},
    {label:'Cotizaciones',   value:cot,  base:tot},
    {label:'Contratos',      value:con,  base:tot},
  ];
  document.getElementById('funnel-steps').innerHTML = steps.map((s,i)=>`
    ${i>0?'<div class="funnel-arrow">芒聙潞</div>':''}
    <div class="funnel-step">
      <div class="step-label">${s.label}</div>
      <div class="step-value">${s.value.toLocaleString('es-ES')}</div>
      <div class="step-pct">${s.base?Math.round(s.value/s.base*100):0}%</div>
    </div>`).join('');
}

// ---- ORIGIN TABLE ----
function renderFunnelTable(d) {
  const funnel = d.funnel || [];
  if (!funnel.length) { document.getElementById('funnel-table').innerHTML = '<div class="empty">Sin datos</div>'; return; }
  const tot = funnel.reduce((s,r)=>s+Number(r.conversaciones),0);
  const cols = [
    {k:'origen',         label:'Origen'},
    {k:'conversaciones', label:'Conv.'},
    {k:'factura_total',  label:'Facturas'},
    {k:'cotitzacions',   label:'Cotiz.'},
    {k:'contractes',     label:'Contratos'},
    {k:'contractes_llum',label:'Luz'},
    {k:'contractes_gas', label:'Gas'},
  ];
  document.getElementById('funnel-table').innerHTML = `<table>
    <thead><tr>${cols.map(c=>`<th>${c.label}</th>`).join('')}<th>Conv. %</th></tr></thead>
    <tbody>${funnel.map(r=>{
      const pct = tot ? Math.round(Number(r.conversaciones)/tot*100) : 0;
      return `<tr>
        <td><strong>${r.origen}</strong></td>
        ${cols.slice(1).map(c=>`<td>${Number(r[c.k]||0).toLocaleString('es-ES')}</td>`).join('')}
        <td><div class="funnel-bar-wrap"><div class="funnel-bar" style="width:${pct}%"></div></div><span class="pct-label">${pct}%</span></td>
      </tr>`;
    }).join('')}</tbody></table>`;
}

// ---- CLOSURE ----
function renderClosure(d) {
  const raw = (d.closure || []).filter(r => r.tipologia !== 'Automatitzada' && r.tipologia !== 'Automatizada');
  if (!raw.length) { document.getElementById('closure-table').innerHTML = '<div class="empty">Sin datos</div>'; return; }
  const tot = raw.reduce((s,r)=>s+Number(r.total),0);
  document.getElementById('closure-table').innerHTML = `<table>
    <thead><tr><th>Tipolog脙颅a</th><th>Total</th><th>%</th></tr></thead>
    <tbody>${raw.map(r=>`<tr>
      <td>${r.tipologia}</td>
      <td>${Number(r.total).toLocaleString('es-ES')}</td>
      <td>${tot?Math.round(Number(r.total)/tot*100):0}%</td>
    </tr>`).join('')}</tbody></table>`;
}

// ---- INCORRECT ----
function renderIncorrect(d) {
  const inc = d.incorrect || {};
  if (!inc.total_cot) { document.getElementById('incorrect-section').innerHTML = '<div class="empty">Sin datos</div>'; return; }
  const ko  = inc.cot_ko  ?? '芒聙聯';
  const kl  = inc.ko_llum ?? '芒聙聯';
  const kg  = inc.ko_gas  ?? '芒聙聯';
  const pct = (inc.total_cot && inc.cot_ko != null) ? Math.round(inc.cot_ko / inc.total_cot * 100) : null;
  document.getElementById('incorrect-section').innerHTML = `
    <table><thead><tr><th>Total cotizaciones</th><th>KO total</th><th>KO %</th><th>KO Luz</th><th>KO Gas</th></tr></thead>
    <tbody><tr>
      <td>${Number(inc.total_cot).toLocaleString('es-ES')}</td>
      <td>${typeof ko==='number'?Number(ko).toLocaleString('es-ES'):ko}</td>
      <td>${pct != null ? pct+'%' : '芒聙聯'}</td>
      <td>${typeof kl==='number'?Number(kl).toLocaleString('es-ES'):kl}</td>
      <td>${typeof kg==='number'?Number(kg).toLocaleString('es-ES'):kg}</td>
    </tr></tbody></table>`;
}

// ---- PERIOD DATE ----
function renderPeriodDate(d) {
  const from = d.date_from || '';
  const to   = (d.date_to   || '').substring(0,10);
  if (from || to) {
    document.getElementById('period-info').textContent = `Per脙颅odo: ${from} 芒聠聮 ${to}`;
  }
}

// ---- WEEKLY CHART ----
function renderChart(weekly) {
  const ctx = document.getElementById('weekly-chart').getContext('2d');
  if (_chart) _chart.destroy();
  _chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: weekly.map(w=>w.semana),
      datasets: [
        {label:'Conversaciones', data:weekly.map(w=>w.conversaciones), backgroundColor:'rgba(123,47,190,.15)', borderColor:'#7B2FBE', borderWidth:2},
        {label:'Cotizaciones',   data:weekly.map(w=>w.cotitzacions),   backgroundColor:'rgba(245,158,11,.15)', borderColor:'#F59E0B', borderWidth:2},
        {label:'Contratos',      data:weekly.map(w=>w.contractes),     backgroundColor:'rgba(16,185,129,.15)', borderColor:'#10B981', borderWidth:2},
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{position:'top'}},
      scales:{y:{beginAtZero:true, ticks:{precision:0}}}
    }
  });
}

// ---- RAW DATA TABLE ----
function renderRawTable(rows) {
  _rawFiltered = applyRawFilter(rows);
  updateRawCount();
  drawRawTable();
}

function applyRawFilter(rows) {
  const q = document.getElementById('raw-search').value.toLowerCase().trim();
  if (!q) return [...rows];
  return rows.filter(r =>
    (r.conversation_id||'').toLowerCase().includes(q) ||
    (r.origen||'').toLowerCase().includes(q) ||
    (r.tipologia||'').toLowerCase().includes(q) ||
    (r.fecha||'').includes(q)
  );
}

function filterRaw() {
  _rawFiltered = applyRawFilter(_rawRows);
  updateRawCount();
  drawRawTable();
}

function updateRawCount() {
  document.getElementById('raw-count').textContent =
    `${_rawFiltered.length.toLocaleString('es-ES')} de ${_rawRows.length.toLocaleString('es-ES')} conversaciones`;
}

function sortRaw(col) {
  if (_rawSort.col === col) {
    _rawSort.dir = _rawSort.dir==='asc' ? 'desc' : 'asc';
  } else {
    _rawSort = {col, dir:'asc'};
  }
  _rawFiltered.sort((a,b)=>{
    const va = a[col]??'', vb = b[col]??'';
    const cmp = String(va).localeCompare(String(vb), 'es', {numeric:true});
    return _rawSort.dir==='asc' ? cmp : -cmp;
  });
  drawRawTable();
}

function drawRawTable() {
  const cols = [
    {k:'fecha',           label:'Fecha'},
    {k:'origen',          label:'Origen'},
    {k:'factura',         label:'Factura'},
    {k:'factura_chat',    label:'Fac. chat'},
    {k:'factura_dades',   label:'Fac. datos'},
    {k:'cotizacion',      label:'Cotiz.'},
    {k:'contrato',        label:'Contrato'},
    {k:'contrato_luz',    label:'C. Luz'},
    {k:'contrato_gas',    label:'C. Gas'},
    {k:'tipologia',       label:'Tipolog脙颅a'},
    {k:'conversation_id', label:'ID Conversaci脙鲁n'},
  ];
  const header = cols.map(c=>{
    const cls = _rawSort.col===c.k ? (_rawSort.dir==='asc'?'sorted-asc':'sorted-desc') : '';
    return `<th class="${cls}" onclick="sortRaw('${c.k}')">${c.label}</th>`;
  }).join('');

  const yesno = v => Number(v)===1
    ? '<span class="badge badge-yes">S脙颅</span>'
    : (Number(v)===0 ? '<span class="badge badge-no">No</span>' : v);

  const rows = _rawFiltered.slice(0, 2000).map(r=>`<tr>
    <td>${r.fecha||''}</td>
    <td>${r.origen||''}</td>
    <td>${yesno(r.factura)}</td>
    <td>${yesno(r.factura_chat)}</td>
    <td>${yesno(r.factura_dades)}</td>
    <td>${yesno(r.cotizacion)}</td>
    <td>${yesno(r.contrato)}</td>
    <td>${yesno(r.contrato_luz)}</td>
    <td>${yesno(r.contrato_gas)}</td>
    <td>${r.tipologia||''}</td>
    <td style="font-size:11px;color:#aaa">${r.conversation_id||''}</td>
  </tr>`).join('');

  const note = _rawFiltered.length > 2000
    ? `<tr><td colspan="${cols.length}" style="text-align:center;color:#aaa;padding:12px">Mostrando los primeros 2.000 resultados de ${_rawFiltered.length.toLocaleString('es-ES')}. Usa el buscador para filtrar.</td></tr>`
    : '';

  document.getElementById('raw-table-wrap').innerHTML =
    `<table><thead><tr>${header}</tr></thead><tbody>${rows}${note}</tbody></table>`;
}

// ---- CSV EXPORT ----
function exportCSV() {
  const cols = ['fecha','origen','factura','factura_chat','factura_dades','cotizacion','contrato','contrato_luz','contrato_gas','tipologia','conversation_id'];
  const header = cols.join(',');
  const escape = v => {
    const s = String(v??'');
    return s.includes(',') || s.includes('"') || s.includes('\n') ? '"'+s.replace(/"/g,'""')+'"' : s;
  };
  const body = _rawFiltered.map(r=>cols.map(c=>escape(r[c])).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+header+'\n'+body], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const today = new Date().toISOString().substring(0,10);
  a.download = `racc_conversaciones_${today}.csv`;
  a.click();
}

// ---- LOAD ----
async function loadDashboard() {
  const url = './data.json?t=' + Date.now();
  try {
    _data = await fetch(url).then(r => r.json());
  } catch(e) {
    alert('Error cargando datos: ' + e.message);
    return;
  }
  if (_data.generated_at) {
    document.getElementById('gen-at').textContent = _data.generated_at.replace('T',' ').replace('Z',' UTC');
  }
  _rawRows = _data.raw || [];
  renderAll();
  renderChart(_data.weekly || []);
  if (_currentView === 'rawdata') renderRawTable(_rawRows);
}
</script>
