# .github/workflows/refresh.yml
# Runs every day at 7am CET (5am UTC in summer / 6am UTC in winter).
# Also triggerable manually from the GitHub Actions tab.

name: Refresh dashboard data

on:
  schedule:
    - cron: '0 5 * * *'   # 5am UTC â 7am CET/CEST
  workflow_dispatch:        # allows manual trigger from the GitHub UI

permissions:
  contents: write           # needed to commit data.json back to the repo

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate data.json
        env:
          TINYBIRD_TOKEN: ${{ secrets.TINYBIRD_TOKEN }}
        run: python generate_data.py

      - name: Commit & push data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          # Only commit if there are changes (avoids empty commits)
          git diff --staged --quiet \
            || git commit -m "chore: refresh dashboard data $(date -u +%Y-%m-%d)"
          git push
